name: release-desktop
run-name: "release desktop ${{ inputs.channel }} v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.17.0)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        default: prod
        options:
          - prod
          - beta

concurrency: release-desktop-${{ inputs.channel }}

permissions:
  contents: write

# ── Reusable step: checkout without symlink errors ────────────────────────────
# The repo contains symlinks (favicon.ico etc). On Linux these fail unless we
# configure git to treat them as plain files before checkout.

jobs:
  # ── Create the GitHub Release tag (runs in parallel with builds) ──────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git to skip symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag "$TAG" || echo "Tag already exists"
          git push origin "$TAG" || echo "Tag already pushed"
          gh release create "$TAG" \
            --title "Agence $TAG" \
            --draft \
            --notes "## Agence $TAG

          ### What's new
          - Local model tool calling (Ollama, LM Studio, vLLM, llama.cpp) now works
          - All models default to tool-capable: phi4, gemma3, deepseek, granite, etc.
          - Ollama /api/show API probing for accurate capability detection
          - XML prompt-injection fallback for models without native tool-call support
          - Web fetch, file read, shell, search, and all other tools now work with local models
          " || echo "Release already exists"

  # ── Build CLI sidecar ─────────────────────────────────────────────────────────
  build-cli:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Configure git to skip symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        run: bun ./packages/agence/script/build.ts
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_RELEASE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: agence-cli-linux
          path: packages/agence/dist/opencode-linux*
          if-no-files-found: warn

  # ── Build Electron (Windows) ──────────────────────────────────────────────────
  build-electron-windows:
    needs: [build-cli, create-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare desktop sidecar
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build frontend
        run: bun run build
        working-directory: packages/desktop
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}

      - name: Package and publish
        run: npx electron-builder --win --publish always --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code signing cert — Windows will show SmartScreen but app works fine
          WIN_CSC_LINK: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: agence-desktop-windows
          path: packages/desktop/dist/*.exe
          if-no-files-found: warn

  # ── Build Electron (Linux) ────────────────────────────────────────────────────
  build-electron-linux:
    needs: [build-cli, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Configure git to skip symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - uses: actions/download-artifact@v4
        with:
          name: agence-cli-linux
          path: packages/agence/dist

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare desktop sidecar
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build frontend
        run: bun run build
        working-directory: packages/desktop
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}

      - name: Package and publish
        run: npx electron-builder --linux --publish always --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agence-desktop-linux
          path: |
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
          if-no-files-found: warn

  # ── Publish (un-draft the release when all builds succeed) ────────────────────
  publish-release:
    needs: [build-electron-windows, build-electron-linux]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Configure git to skip symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          gh release edit "$TAG" --draft=false --latest
          echo "Release $TAG is now live!"
          gh release view "$TAG"

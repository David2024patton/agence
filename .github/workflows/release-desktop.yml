name: release-desktop
run-name: "release desktop ${{ inputs.channel }} v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.17.0)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        default: prod
        options:
          - prod
          - beta

concurrency: release-desktop-${{ inputs.channel }}

permissions:
  contents: write

jobs:
  # ── Step 1: Create the GitHub Release tag ─────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Disable symlinks (repo has symlinked favicons)
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag "$TAG" || echo "Tag already exists"
          git push origin "$TAG" || echo "Tag already pushed"
          gh release create "$TAG" \
            --title "Agence $TAG" \
            --draft \
            --notes "## Agence $TAG

          ### What's new
          - Local model tool calling now works (Ollama, LM Studio, vLLM, llama.cpp)
          - All models default to tool-capable: phi4, gemma3, deepseek, granite, etc.
          - Ollama /api/show probing for accurate capability detection
          - XML prompt-injection fallback for models without native tool-call support
          - Web fetch, file read, shell, search all work with local models
          " || echo "Release already exists — continuing"

  # ── Step 2: Build CLI sidecar (waits for release tag to exist) ────────────────
  build-cli:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Disable symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        run: bun ./packages/agence/script/build.ts
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_RELEASE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      # The build script names outputs agence-linux-* (rebranded from opencode-linux-*)
      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: agence-cli-linux
          path: packages/agence/dist/agence-linux*
          if-no-files-found: error

  # ── Step 3a: Build Electron for Windows ───────────────────────────────────────
  build-electron-windows:
    needs: [build-cli, create-release]
    runs-on: windows-latest
    steps:
      # Windows also needs symlinks disabled — do it before checkout via env
      - name: Disable symlinks (Windows)
        shell: pwsh
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4
        env:
          GIT_CONFIG_PARAMETERS: "'core.symlinks=false'"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare desktop sidecar
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build frontend
        run: bun run build
        working-directory: packages/desktop
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}

      - name: Package and publish to GitHub Release
        run: npx electron-builder --win --publish always --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agence-desktop-windows
          path: packages/desktop/dist/*.exe
          if-no-files-found: warn

  # ── Step 3b: Build Electron for Linux ─────────────────────────────────────────
  build-electron-linux:
    needs: [build-cli, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Disable symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Download Linux CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: agence-cli-linux
          path: packages/agence/dist

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare desktop sidecar
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          AGENCE_VERSION: ${{ inputs.version }}
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build frontend
        run: bun run build
        working-directory: packages/desktop
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}

      - name: Package and publish to GitHub Release
        run: npx electron-builder --linux --publish always --config electron-builder.config.ts
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          AGENCE_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agence-desktop-linux
          path: |
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
          if-no-files-found: warn

  # ── Step 4: Un-draft the release so electron-updater sees it ─────────────────
  publish-release:
    needs: [build-electron-windows, build-electron-linux]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Disable symlinks
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          gh release edit "$TAG" --draft=false --latest
          echo "✅ Release $TAG is now live!"
          gh release view "$TAG"
